version: "3.8"

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: secondbrain-db
    environment:
      POSTGRES_USER: secondbrain_user
      POSTGRES_PASSWORD: changeme_securepassword
      POSTGRES_DB: secondbrain
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - secondbrain
    restart: unless-stopped

  # Optional: pgAdmin for database management via web UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: secondbrain-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@example.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - secondbrain
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  secondbrain:
