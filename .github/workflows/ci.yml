name: CI

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

jobs:
  quality:
    name: Type, Lint, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate Tauri custom-protocol feature
        run: cargo metadata --manifest-path src-tauri/Cargo.toml --no-deps --format-version 1 --features custom-protocol > /dev/null

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run type-check

      - name: Lint (Biome)
        run: bun run biome:check

      - name: Unit tests
        run: bun run test:unit
