name: CI

on:
  push:
    branches:
      - testing

jobs:
  quality:
    name: Type, Lint, Test
    runs-on: ubuntu-latest

    steps:
      # Pinned from actions/checkout@v4
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      # Pinned from dtolnay/rust-toolchain@stable
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537
        with:
          toolchain: stable

      - name: Validate Tauri custom-protocol feature
        run: cargo metadata --manifest-path src-tauri/Cargo.toml --no-deps --format-version 1 --features custom-protocol > /dev/null

      # Pinned from oven-sh/setup-bun@v2
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run type-check

      - name: Lint (Biome)
        run: bun run biome:check

      - name: Unit tests
        run: bun run test:unit

  package-macos:
    name: Build macOS App Bundle
    runs-on: macos-latest
    needs: quality

    steps:
      # Pinned from actions/checkout@v4
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      # Pinned from dtolnay/rust-toolchain@stable
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537
        with:
          toolchain: stable

      # Pinned from oven-sh/setup-bun@v2
      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app (macOS)
        run: bun run build

      # Pinned from actions/upload-artifact@v4
      - name: Upload macOS app artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: Second-Brain-macOS-app
          path: src-tauri/target/release/bundle/macos/Second Brain.app
          if-no-files-found: error

      # Pinned from actions/upload-artifact@v4
      - name: Upload macOS dmg artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: Second-Brain-macOS-dmg
          path: src-tauri/target/release/bundle/dmg/Second Brain_*.dmg
          if-no-files-found: error
