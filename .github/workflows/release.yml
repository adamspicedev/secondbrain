name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - release

permissions:
  contents: write

concurrency:
  group: release-branch
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Tauri app (macOS)
        run: bun run build

      - name: Verify DMG bundle exists
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          dmg_files=(src-tauri/target/release/bundle/dmg/*.dmg)

          if [ ${#dmg_files[@]} -eq 0 ]; then
            echo "No DMG found at src-tauri/target/release/bundle/dmg/*.dmg"
            echo "Build did not produce a DMG, so release assets would be missing."
            exit 1
          fi

          echo "Found DMG artifacts:"
          ls -lh src-tauri/target/release/bundle/dmg/*.dmg

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run release