name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest

    steps:
      # Pinned from actions/checkout@v4
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Gate release to merged testing -> main PRs
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          pr_number="$(gh api repos/${{ github.repository }}/commits/${{ github.sha }}/pulls --jq '.[] | select(.base.ref == "main" and .head.ref == "testing" and .merged_at != null) | .number' | head -n 1 || true)"

          if [[ -z "${pr_number}" ]]; then
            echo "No merged testing -> main PR found for commit ${{ github.sha }}. Skipping release."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Matched merged testing -> main PR #${pr_number}. Proceeding with release."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      # Pinned from oven-sh/setup-bun@v2
      - name: Setup Bun
        if: steps.gate.outputs.should_release == 'true'
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: "1.3.14"

      - name: Install dependencies
        if: steps.gate.outputs.should_release == 'true'
        run: bun install --frozen-lockfile

      - name: Publish GitHub Release
        if: steps.gate.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run release
